# Deploy til Vercel ved push til main (bygger pa Vercels servere — samme som Git-integration).
# Brug dette hvis Vercel ikke opretter nye deployments fra GitHub automatisk.
#
# Engangs-setup: GitHub repo -> Settings -> Secrets and variables -> Actions:
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       Vercel Team Settings -> General (Team ID)
#   VERCEL_PROJECT_ID   Project -> Settings -> General (Project ID)
#
# Vigtigt i Vercel UI: Settings -> General -> Root Directory skal vaere TOM.
# Hvis den er sat til "legacy", faar du den gamle statiske forside.

name: Deploy production to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
