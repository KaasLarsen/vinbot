# Valgfri CLI-deploy via secrets. Primær deploy er Vercel Git-integration (vercel[bot]).
# Secrets (valgfrit): npm run vercel:secrets
#
# Vercel UI for vinbot-thisone: Root Directory skal vaere TOM (ikke "legacy").

name: Deploy production to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bekraeft Next.js repo (ikke kun legacy)
        run: |
          test -f app/layout.tsx || (echo "::error::Mangler app/layout.tsx — forkert root eller gammelt checkout"; exit 1)
          node -e "const p=require('./package.json'); if(!p.dependencies?.next) { process.exit(1) }" || (echo "::error::package.json skal have next"; exit 1)

      - name: Tjek Vercel secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipper CLI-deploy — mangler VERCEL_* secrets. Produktion deploys via Vercel Git-integration."
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.secrets.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Deploy til Vercel
        if: steps.secrets.outputs.has_secrets == 'true'
        run: npx vercel@latest deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
